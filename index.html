<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SISTEMA IA - DOUBLE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:black;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* PAINEL */

#painel{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:340px;
background:#000;
padding:25px;
border-radius:25px;
box-shadow:0 0 40px red;
text-align:center;
}

/* TITULO */

.title{
font-size:24px;
color:red;
font-weight:bold;
text-shadow:0 0 15px red;
margin-bottom:10px;
}

/* RELÓGIO */

.clock{
font-size:14px;
opacity:.8;
margin-bottom:20px;
}

/* BOTÃO */

button{
width:100%;
padding:16px;
border:none;
border-radius:20px;
background:linear-gradient(90deg,#ff0000,#ff3b3b);
color:white;
font-weight:bold;
font-size:18px;
display:flex;
align-items:center;
justify-content:center;
gap:10px;
box-shadow:0 0 25px red;
cursor:pointer;
margin-bottom:20px;
}

/* CAIXA */

.sinal-box{
border:2px solid red;
border-radius:20px;
padding:20px;
box-shadow:0 0 20px red;
}

/* BOLA */

.ball{
width:130px;
height:130px;
border-radius:50%;
margin:10px auto;
animation:pulse 1.5s infinite;
}

/* 🔴 VERMELHO */
.red{
background:radial-gradient(circle at 30% 30%, #ff8080, #ff0000 40%, #660000);
box-shadow:0 0 40px red;
}

/* ⚫ PRETO */
.black{
background:radial-gradient(circle, #555, #000);
box-shadow:0 0 25px #222;
}

/* TEXTO */

.sinal-text{
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

/* ANIMAÇÃO */

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.15)}
100%{transform:scale(1)}
}

.next{
color:red;
font-weight:bold;
margin-top:10px;
}

.gale{
font-size:13px;
opacity:.8;
}

/* BARRA */

.progress-box{
margin-top:15px;
display:none;
}

.progress-bar{
width:100%;
height:18px;
background:#1a0000;
border-radius:20px;
overflow:hidden;
box-shadow:0 0 10px red inset;
}

.progress-fill{
width:0%;
height:100%;
background:linear-gradient(90deg,#ff0000,#ff4040);
border-radius:20px;
}

.progress-text{
display:flex;
justify-content:space-between;
font-size:12px;
margin-top:5px;
color:#ff3b3b;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div id="painel">

<div class="title">IA DOUBLE</div>
<div class="clock" id="hora"></div>

<button onclick="gerarSinal()" id="btn">
⚡ GERAR SINAL 🎯
</button>

<div class="sinal-box">

<div id="sinal"></div>

<div class="progress-box" id="progressBox">
<div class="progress-bar">
<div class="progress-fill" id="barra"></div>
</div>
<div class="progress-text">
<span>Processando IA...</span>
<span id="porcentagem">0%</span>
</div>
</div>

<div class="next">JOGAR NA PRÓXIMA RODADA</div>
<div class="gale">Apostar até G1</div>

</div>

</div>

<script>

/* RELÓGIO */
function atualizarHora(){
let hora = new Date().toLocaleTimeString("pt-BR",{timeZone:"America/Sao_Paulo"})
document.getElementById("hora").innerText="⏰ Brasília "+hora
}
setInterval(atualizarHora,1000)
atualizarHora()

/* CONTROLE */
let carregando = false

/* GERAR SINAL */
function gerarSinal(){

if(carregando) return
carregando = true

let btn = document.getElementById("btn")
btn.disabled = true
btn.style.opacity = "0.6"

let barra = document.getElementById("barra")
let porcentagem = document.getElementById("porcentagem")
let progressBox = document.getElementById("progressBox")

progressBox.style.display="block"

let progresso=0
barra.style.width="0%"
porcentagem.innerText="0%"

let load = setInterval(()=>{

progresso++
barra.style.width=progresso+"%"
porcentagem.innerText=progresso+"%"

if(progresso>=100){
clearInterval(load)
mostrarSinal()

carregando = false
btn.disabled = false
btn.style.opacity = "1"
}

},25)

}

/* MOSTRAR SINAL */
function mostrarSinal(){

let cor = Math.random()<0.5 ? "red" : "black"
let protecao = Math.random()<0.3

let sinal = document.getElementById("sinal")
sinal.innerHTML = ""

// TEXTO
let texto = document.createElement("div")
texto.className = "sinal-text"

if(cor === "red"){
texto.innerHTML = "🔴 ENTRAR NO VERMELHO"
}else{
texto.innerHTML = "⚫ ENTRAR NO PRETO"
}

if(protecao){
texto.innerHTML += "<br>🛡 PROTEGER NO BRANCO"
}

// BOLA
let bola = document.createElement("div")
bola.className = "ball " + cor

sinal.appendChild(texto)
sinal.appendChild(bola)

}

/* MATRIX */
const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const letters="0123456789"
const fontSize=14
const columns=canvas.width/fontSize
const drops=[]

for(let x=0;x<columns;x++) drops[x]=1

function draw(){
ctx.fillStyle="rgba(0,0,0,0.05)"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="red"
ctx.font=fontSize+"px monospace"

for(let i=0;i<drops.length;i++){
let text=letters.charAt(Math.random()*letters.length)
ctx.fillText(text,i*fontSize,drops[i]*fontSize)

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0

drops[i]++
}
}

setInterval(draw,33)

</script>

</body>
</html>
