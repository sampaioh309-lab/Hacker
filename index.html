<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Suspenso</title>

<style>
body {
  margin: 0;
  height: 100vh;
  background: #0b0b0b;
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  color: #fff;
}

.box {
  background: #121212;
  padding: 40px;
  border-radius: 10px;
  text-align: center;
  box-shadow: 0 0 25px rgba(255, 0, 0, 0.25);
  max-width: 420px;
}

h1 {
  color: #ff2e2e;
  margin-bottom: 15px;
}

p {
  color: #cfcfcf;
  margin: 10px 0;
}

.alert {
  margin-top: 20px;
  font-size: 14px;
  color: #777;
}
</style>

</head>
<body>

<div class="box">
  <h1>ACESSO BLOQUEADO</h1>
  
  <p><strong>Sistema temporariamente indisponível</strong></p>
  
  <p>Este domínio foi suspenso devido à falta de pagamento ao desenvolvedor responsável.</p>
  
  <p>Para reativação, é necessário regularizar os débitos pendentes.</p>

  <div class="alert">
    Código do bloqueio: DEV-402-PAGAMENTO
  </div>
</div>

</body>
</html>
