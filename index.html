<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>IA DOUBLE PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:black;color:white;overflow-y:auto;}
canvas{position:fixed;top:0;left:0;z-index:-1;}
#painel{margin:30px auto;width:340px;background:#000;padding:25px;border-radius:25px;box-shadow:0 0 40px red;text-align:center;}
.title{font-size:24px;color:red;margin-bottom:10px;}
.clock{font-size:14px;margin-bottom:20px;}
button{width:100%;padding:16px;border:none;border-radius:20px;background:linear-gradient(90deg,#ff0000,#ff3b3b);color:white;font-weight:bold;font-size:18px;margin-bottom:20px;cursor:pointer;}
.progress-bar{width:100%;height:18px;background:#1a0000;border-radius:20px;overflow:hidden;}
.progress-fill{width:0%;height:100%;background:linear-gradient(90deg,#ff0000,#ff4040);transition:width 0.2s;}
.progress-text{font-size:12px;margin-top:5px;color:#ff3b3b;}
.sinal-text{font-size:18px;margin-top:15px;font-weight:bold;animation:pop 0.4s ease;}
@keyframes pop{0%{transform:scale(0.7);opacity:0;}100%{transform:scale(1);opacity:1;}}
.ball-container{position:relative;width:130px;height:130px;margin:25px auto;}
.ball{width:130px;height:130px;border-radius:50%;position:absolute;top:0;left:0;animation:pulse 1.5s infinite;}
.red{background:radial-gradient(circle at 30% 25%, #fff, #ff4d4d 30%, #ff0000 70%, #660000);box-shadow:0 4px 10px rgba(0,0,0,0.6), inset 0 -8px 15px rgba(0,0,0,0.5);}
.black{background:radial-gradient(circle at 30% 25%, #fff, #666 30%, #000 70%);box-shadow:0 4px 10px rgba(0,0,0,0.8), inset 0 -8px 15px rgba(0,0,0,0.6);}
.mira{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:170px;height:170px;border-radius:50%;animation:rotate 6s linear infinite;}
.mira.red{color:red;border:2px solid red;}
.mira.black{color:white;border:2px solid white;}
.mira::before,.mira::after{content:"";position:absolute;background:currentColor;opacity:0.7;}
.mira::before{width:2px;height:100%;left:50%;top:0;transform:translateX(-50%);}
.mira::after{height:2px;width:100%;top:50%;left:0;transform:translateY(-50%);}
.ia-status{color:#00ffcc;margin-top:15px;font-weight:bold;}
.ia-info{display:flex;justify-content:space-between;margin-top:10px;font-size:13px;}
.logs{font-size:11px;max-height:80px;overflow-y:auto;margin-top:10px;text-align:left;}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
@keyframes rotate{0%{transform:translate(-50%,-50%) rotate(0deg);}100%{transform:translate(-50%,-50%) rotate(360deg);}}
</style>
</head>
<body>
<audio id="som" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<canvas id="matrix"></canvas>
<div id="painel">
  <div class="title">IA DOUBLE PRO</div>
  <div class="clock" id="hora"></div>
  <button onclick="gerarSinal()">⚡ GERAR SINAL 🎯</button>
  <div class="progress-bar"><div class="progress-fill" id="barra"></div></div>
  <div class="progress-text" id="porcentagem">0%</div>
  <div id="sinal"></div>
  <div class="ia-status" id="iaStatus">🔎 Aguardando análise...</div>
  <div class="ia-info">
    <div>Assertividade: <span id="assert">--%</span></div>
    <div>Tendência: <span id="tendencia">--</span></div>
  </div>
  <div class="logs" id="logs"></div>
</div>

<script>
/* RELÓGIO */
setInterval(()=>{
  document.getElementById("hora").innerText=new Date().toLocaleTimeString()
},1000)

/* PADRÃO DE MINUTOS */
const padraoMinutos = {
  "00": { sinal: "🔴", protecao: "⚪️" },
  "01": { sinal: "🔴", protecao: "⚪️" },
  "02": { sinal: "🔴", protecao: "⚪️" },
  "03": { sinal: "⚫", protecao: "⚪️" },
  "04": { sinal: "⚫", protecao: "⚪️" },
  "05": { sinal: "⚫", protecao: "⚪️" },
  "06": { sinal: "🔴", protecao: "⚪️" },
  "07": { sinal: "🔴", protecao: "⚪️" },
  "08": { sinal: "🔴", protecao: "⚪️" },

  "10": { sinal: "⚫", protecao: "⚪️" },
  "11": { sinal: "⚫", protecao: "⚪️" },
  "12": { sinal: "🔴", protecao: "⚪️" },
  "13": { sinal: "🔴", protecao: "⚪️" },
  "14": { sinal: "🔴", protecao: "⚪️" },
  "15": { sinal: "⚫", protecao: "-" },
  "16": { sinal: "⚫", protecao: "-" },
  "17": { sinal: "⚫", protecao: "-" },
  "18": { sinal: "🔴", protecao: "-" },
  "19": { sinal: "🔴", protecao: "-" },
  "20": { sinal: "🔴", protecao: "-" },
  "21": { sinal: "⚫", protecao: "-" },
  "22": { sinal: "⚫", protecao: "-" },
  "23": { sinal: "⚫", protecao: "-" },
  "24": { sinal: "🔴", protecao: "⚪️" },
  "25": { sinal: "🔴", protecao: "⚪️" },
  "26": { sinal: "🔴", protecao: "⚪️" },
  "27": { sinal: "⚫", protecao: "⚪️" },
  "28": { sinal: "⚫", protecao: "⚪️" },
  "29": { sinal: "⚫", protecao: "⚪️" },
  "30": { sinal: "🔴", protecao: "⚪️" },
  "31": { sinal: "🔴", protecao: "⚪️" },
  "32": { sinal: "🔴", protecao: "⚪️" },
  "33": { sinal: "⚫", protecao: "⚪️" },
  "34": { sinal: "⚫", protecao: "⚪️" },
  "35": { sinal: "⚫", protecao: "⚪️" },
  "36": { sinal: "🔴", protecao: "⚪️" },
  "37": { sinal: "🔴", protecao: "⚪️" },

  "43": { sinal: "🔴", protecao: "-" },
  "44": { sinal: "🔴", protecao: "-" },
  "45": { sinal: "⚫", protecao: "⚪️" },
  "46": { sinal: "⚫", protecao: "⚪️" },
  "47": { sinal: "⚫", protecao: "⚪️" },
  "48": { sinal: "🔴", protecao: "⚪️" },
  "49": { sinal: "🔴", protecao: "⚪️" },
  "50": { sinal: "🔴", protecao: "⚪️" },
  "51": { sinal: "⚫", protecao: "⚪️" },
  "52": { sinal: "⚫", protecao: "⚪️" },
  "53": { sinal: "⚫", protecao: "⚪️" },
  "54": { sinal: "🔴", protecao: "⚪️" },
  "55": { sinal: "🔴", protecao: "⚪️" },
  "56": { sinal: "🔴", protecao: "⚪️" },
  "57": { sinal: "⚫", protecao: "⚪️" },
  "58": { sinal: "⚫", protecao: "⚪️" },
  "59": { sinal: "⚫", protecao: "⚪️" }
}

/* GERAR SINAL */
function gerarSinal(){
  let barra = document.getElementById("barra")
  let porcentagem = document.getElementById("porcentagem")
  let logs = document.getElementById("logs")
  let sinalDiv = document.getElementById("sinal")
  let status = document.getElementById("iaStatus")
  let assert = document.getElementById("assert")
  let tendencia = document.getElementById("tendencia")

  let progresso = 0
  barra.style.width="0%"
  porcentagem.innerText="0%"
  logs.innerHTML=""
  sinalDiv.innerHTML=""

  let etapas = [
    "🔎 Lendo histórico...",
    "📊 Calculando padrão...",
    "🧠 Cruzando dados...",
    "📈 Analisando tendência...",
    "⚡ Gerando probabilidade..."
  ]
  let etapaIndex = 0

  let load = setInterval(()=>{
    progresso += Math.random()*3
    if(progresso>100) progresso=100
    barra.style.width = progresso + "%"
    porcentagem.innerText = Math.floor(progresso) + "%"

    if(progresso%20<2 && etapaIndex<etapas.length){
      status.innerText = etapas[etapaIndex]
      logs.innerHTML += "> " + etapas[etapaIndex] + "<br>"
      logs.scrollTop = logs.scrollHeight
      etapaIndex++
    }

    assert.innerText = (65 + Math.random()*30).toFixed(0) + "%"
    tendencia.innerText = Math.random()>0.5 ? "📈 Subindo" : "📉 Descendo"

    if(progresso>=100){
      clearInterval(load)
      document.getElementById("som").play()
      status.innerText = "✅ Entrada confirmada"
      mostrarSinal()
    }
  },30)
}

/* MOSTRAR SINAL SEGUNDO PADRÃO */
function mostrarSinal(){
  let now = new Date()
  let minuto = String(now.getMinutes()).padStart(2,'0')
  let padrao = padraoMinutos[minuto]

  let cor = padrao.sinal === "🔴" ? "red" : "black"
  let texto = padrao.sinal === "🔴" ? "🔴 ENTRAR NO VERMELHO" : "⚫ ENTRAR NO PRETO"

  if(padrao.protecao && padrao.protecao !== "-"){
    texto += "<br>🛡 PROTEGER NO BRANCO"
  }

  document.getElementById("sinal").innerHTML = `
    <div class="sinal-text">${texto}</div>
    <div class="ball-container">
      <div class="mira ${cor}"></div>
      <div class="ball ${cor}"></div>
    </div>
  `
}

/* MATRIX */
const canvas=document.getElementById("matrix")
const ctx=canvas.getContext("2d")
canvas.width=window.innerWidth
canvas.height=window.innerHeight
const letters="0123456789"
const fontSize=14
const columns=canvas.width/fontSize
const drops=[]
for(let x=0;x<columns;x++) drops[x]=1
function draw(){
  ctx.fillStyle="rgba(0,0,0,0.05)"
  ctx.fillRect(0,0,canvas.width,canvas.height)
  ctx.fillStyle="red"
  ctx.font=fontSize+"px monospace"
  for(let i=0;i<drops.length;i++){
    let text=letters.charAt(Math.floor(Math.random()*letters.length))
    ctx.fillText(text,i*fontSize,drops[i]*fontSize)
    if(drops[i]*fontSize>canvas.height && Math.random()>0.975) drops[i]=0
    drops[i]++
  }
}
setInterval(draw,33)
</script>
</body>
</html>
